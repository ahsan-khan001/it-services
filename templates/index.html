<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANT Group Extractor</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --border: #d1d5db;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="url"] {
      flex: 1;
      min-width: 260px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    button {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover { background: var(--accent-hover); }

    .result,
    .error {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
    }

    .result {
      border: 1px solid var(--border);
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .value {
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: 0.96rem;
      word-break: break-word;
    }

    .error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #fecaca;
    }

    .copy-status {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    .note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ANT Group Extractor</h1>
    <p>Paste a URL to extract the ANT group name from page content, with URL fallback.</p>

    <form method="POST" action="/">
      <input
        type="url"
        name="url"
        placeholder="https://permissions.amazon.com/a/team/example-group"
        value="{{ submitted_url }}"
        required
      >
      <button type="submit">Submit</button>
    </form>

    {% if error %}
      <section class="error">{{ error }}</section>
    {% endif %}

    {% if note %}
      <section class="note">{{ note }}</section>
    {% endif %}

    {% if ant_group %}
      <section class="result">
        <div>
          <strong>Extracted ANT Group:</strong>
          <div id="antGroupValue" class="value">{{ ant_group }}</div>
        </div>
        <button type="button" id="copyBtn">Copy</button>
      </section>
      <div id="copyStatus" class="copy-status"></div>
    {% endif %}
  </main>

  <script>
    (function () {
      const copyBtn = document.getElementById('copyBtn');
      const valueEl = document.getElementById('antGroupValue');
      const statusEl = document.getElementById('copyStatus');

      if (!copyBtn || !valueEl) return;

      copyBtn.addEventListener('click', async function () {
        const text = valueEl.textContent.trim();

        try {
          await navigator.clipboard.writeText(text);
          if (statusEl) statusEl.textContent = 'Copied to clipboard.';
        } catch (err) {
          if (statusEl) statusEl.textContent = 'Copy failed. Please copy manually.';
        }
      });
    })();
  </script>
</body>
</html>
